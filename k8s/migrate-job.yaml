apiVersion: batch/v1
kind: Job
metadata:
  name: complyt-migrate
  namespace: complyt
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: complyt-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: complyt-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: complyt-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: complyt-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
